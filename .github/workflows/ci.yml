name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      # Prettier was applied across the codebase in the 2026-07 refresh (4e66a49)
      # and `format:check` has been clean since. Gating it keeps it that way.
      # Note tests/fixtures/ is deliberately in .prettierignore: those files are
      # DATA that tests assert on as exact text, so reformatting them would
      # silently change what the assertions verify while still passing.
      - name: Format check
        run: npm run format:check
      # Blocking as of the 2026-07 refresh: the type-debt burndown took
      # `npm run typecheck` from 279 errors to 0, with strictNullChecks on.
      # Keep it at 0 — while it was unenforced, a dependency bump (antd v5 -> v6,
      # ApexCharts v4, react-grid-layout v2) turned type errors into
      # silently-ignored props that shipped as latent UI bugs.
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm run test:unit
      - name: Build
        run: npm run package
